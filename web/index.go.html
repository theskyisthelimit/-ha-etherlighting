<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔦</text></svg>"
    />
    <title>Etherlighter - {{ .IP }}</title>
    <style>
      :root {
        --font: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo,
          Consolas, "DejaVu Sans Mono", monospace;
        --primary: #00e291;
        --background: #111;
        --danger: #ff4d4f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        background-color: var(--background);
        color: #ddd;
        max-width: 56rem;
        margin: 1rem auto;
        padding: 0 0.5rem;
      }

      body > * {
        margin-bottom: 1rem;
      }

      code {
        font-size: 0.9rem;
        color: var(--primary);
      }

      button {
        --color: var(--primary);

        display: inline-block;
        padding: 0.3rem 0.7rem;
        cursor: pointer;
        background-color: transparent;
        text-decoration: none;
        outline: none;
        border: 1px solid var(--color);
        color: var(--color);
        font-family: var(--font);
        font-size: 1rem;
      }

      button:hover {
        background-color: var(--color);
        color: var(--background);
        transition: all 0.2s;
      }

      button.danger {
        --color: var(--danger);
      }

      hr {
        border: none;
        border-top: 1px dashed #eee;
        margin: 2rem 0;
      }

      .ports {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }

      .port {
        --size: 1.8rem;

        display: flex;
        flex: 1;
        cursor: pointer;
        height: var(--size);
        width: var(--size);
        min-width: var(--size);
        max-width: var(--size);
        position: relative;
        margin-bottom: 2rem;
        border: 2px solid transparent;
      }

      .port[aria-selected] {
        outline: 2px solid var(--primary);
        border-color: var(--background);
      }

      .port[aria-selected] > .port-idx {
        color: var(--primary);
        font-weight: bold;
      }

      .port-idx {
        position: absolute;
        top: 175%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 0.8rem;
        user-select: none;
      }

      .status-line {
        color: #aaa;
        font-size: 0.85rem;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 22rem;
        margin: 0 auto;
      }

      .controls label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        font-size: 0.9rem;
      }

      .controls input[type="range"] {
        width: 100%;
        accent-color: var(--primary);
      }

      .controls output {
        color: var(--primary);
        font-weight: bold;
      }
    </style>
    <script type="module">
      const rgb = (color) => {
        if (color.startsWith("#")) {
          return {
            r: parseInt(color.slice(1, 3), 16),
            g: parseInt(color.slice(3, 5), 16),
            b: parseInt(color.slice(5, 7), 16),
          };
        }

        const match = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (match) {
          return {
            r: +match[1],
            g: +match[2],
            b: +match[3],
          };
        }

        const [r, g, b] = color
          .slice(4, -1)
          .split(",")
          .map((c) => +c);
        return { r, g, b: b };
      };

      const colorToCss = ({ r, g, b }) => `rgb(${r}, ${g}, ${b})`;

      const selectedPorts = () =>
        document.querySelectorAll(".port[aria-selected]");

      const ports = document.querySelectorAll(".port");
      let statusLine = document.getElementById("current-colors-status");
      let cyclePreviewTimer = null;
      let cyclePreviewStep = 0;
      let cyclePreviewPattern = "all";

      const speedSlider = document.getElementById("speed-slider");
      const brightnessSlider = document.getElementById("brightness-slider");
      const tailSlider = document.getElementById("tail-slider");

      const debounce = (fn, ms) => {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), ms);
        };
      };

      // Mirrors transition_speed_to_interval() in coordinator.py.
      const transitionSpeedToInterval = (speed) => {
        speed = Math.max(1, Math.min(100, Math.round(speed)));
        if (speed <= 50) {
          return 1.0 - ((speed - 1) / 49) * 0.8;
        }
        return 0.2 - ((speed - 50) / 50) * 0.15;
      };

      const animationSettings = () => ({
        interval: transitionSpeedToInterval(+speedSlider.value),
        brightness: +brightnessSlider.value,
        scanner_tail: +tailSlider.value,
      });

      const previewIntervalMs = () =>
        Math.round(transitionSpeedToInterval(+speedSlider.value) * 1000);

      const setStatus = (message) => {
        statusLine.innerText = message;
      };

      const setPortColor = (port, color) => {
        port.style.backgroundColor = colorToCss(color);
      };

      // Mirrors _kitt_port_colors() in etherlighter.py.
      const kittPreviewColor = (offset, tail, brightness) => {
        const n = ports.length;
        let head;
        let dir;
        if (n <= 1) {
          head = 0;
          dir = 1;
        } else {
          const period = (n - 1) * 2;
          const phase = cyclePreviewStep % period;
          if (phase <= n - 1) {
            head = phase;
            dir = 1;
          } else {
            head = period - phase;
            dir = -1;
          }
        }
        const distance = (head - offset) * dir;
        let red;
        if (distance < 0 || distance > tail) {
          red = 0;
        } else if (distance === 0) {
          red = Math.round((255 * brightness) / 100);
        } else {
          const fade = (tail - distance + 1) / (tail + 1);
          red = Math.round((255 * brightness * fade) / 100);
        }
        return `rgb(${red}, 0, 0)`;
      };

      const previewCycleColor = () => {
        const { brightness, scanner_tail: tail } = animationSettings();
        ports.forEach((port, offset) => {
          if (cyclePreviewPattern === "kitt") {
            port.style.backgroundColor = kittPreviewColor(offset, tail, brightness);
          } else {
            const hue =
              cyclePreviewPattern === "offset"
                ? (cyclePreviewStep * 8 + (offset * 360) / ports.length) % 360
                : (cyclePreviewStep * 8) % 360;
            const lightness = 50 * (brightness / 100);
            port.style.backgroundColor = `hsl(${hue}, 100%, ${lightness}%)`;
          }
        });
        cyclePreviewStep += 1;
      };

      const startCyclePreview = (pattern = "all") => {
        if (cyclePreviewTimer) {
          clearInterval(cyclePreviewTimer);
        }
        cyclePreviewPattern = pattern;
        cyclePreviewStep = 0;
        const statusByPattern = {
          offset: "Current colors: cycling ports staggered",
          kitt: "Current colors: KITT scanner",
        };
        setStatus(statusByPattern[pattern] || "Current colors: cycling all ports");
        previewCycleColor();
        cyclePreviewTimer = setInterval(previewCycleColor, previewIntervalMs());
      };

      const restartPreviewTimer = () => {
        if (!cyclePreviewTimer) {
          return;
        }
        clearInterval(cyclePreviewTimer);
        cyclePreviewTimer = setInterval(previewCycleColor, previewIntervalMs());
      };

      const stopCyclePreview = () => {
        if (cyclePreviewTimer) {
          clearInterval(cyclePreviewTimer);
          cyclePreviewTimer = null;
        }
      };

      // Push live slider changes to a running animation without restarting it.
      const sendCycleUpdate = debounce(() => {
        if (!cyclePreviewTimer) {
          return;
        }
        postJSON("/api/cycle", {
          enabled: true,
          pattern: cyclePreviewPattern,
          ...animationSettings(),
        }).catch((error) => setStatus(`Failed: ${error.message}`));
      }, 150);

      [speedSlider, brightnessSlider, tailSlider].forEach((slider) => {
        const output = document.getElementById(`${slider.id}-value`);
        const sync = () => {
          if (output) {
            output.value = slider.value;
          }
        };
        sync();
        slider.addEventListener("input", () => {
          sync();
          restartPreviewTimer();
          sendCycleUpdate();
        });
      });

      const refreshPortColors = async () => {
        stopCyclePreview();
        setStatus("Current colors: loading");
        ports.forEach((port) => {
          port.style.backgroundColor = "#222";
        });

        try {
          const response = await fetch("/api/port-colors");
          if (!response.ok) {
            throw new Error(await response.text());
          }

          const snapshot = await response.json();
          snapshot.colors.forEach(({ index, color }) => {
            const port = document.querySelector(`.port[data-index="${index}"]`);
            if (port) {
              setPortColor(port, color);
            }
          });

          if (snapshot.source === "device") {
            setStatus("Current colors: device");
          } else if (snapshot.source === "cycle") {
            startCyclePreview(snapshot.pattern || "all");
          } else if (snapshot.source === "session") {
            setStatus("Current colors: last applied in this session");
          } else {
            setStatus("Current colors: unavailable");
          }
        } catch (error) {
          setStatus(`Current colors: failed (${error.message})`);
        }
      };

      const postJSON = async (url, data) => {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        });

        if (!response.ok) {
          throw new Error(await response.text());
        }
      };

      let colorPicker = document.getElementById("color-picker");
      colorPicker.addEventListener("input", ({ target }) => {
        const color = target.value;
        ports.forEach((port) => {
          if (port.hasAttribute("aria-selected")) {
            port.style.backgroundColor = color;
          }
        });
      });

      let bulkSelector = document.querySelector("#bulk-selector");
      const updateSelector = () => {
        let numSelected = selectedPorts().length;
        let label = bulkSelector.labels[0];

        if (numSelected === 0) {
          bulkSelector.indeterminate = false;
          bulkSelector.checked = false;
          label.innerText = "None selected";
        } else if (numSelected === ports.length) {
          bulkSelector.indeterminate = false;
          bulkSelector.checked = true;
          label.innerText = "All selected";
        } else {
          bulkSelector.indeterminate = true;
          label.innerText = `${numSelected} selected`;
        }
      };
      bulkSelector.addEventListener("change", (event) => {
        event.preventDefault();

        if (event.target.checked) {
          ports.forEach((port) => {
            port.setAttribute("aria-selected", "");
          });
        } else {
          ports.forEach((port) => {
            port.removeAttribute("aria-selected");
          });
        }

        updateSelector();
      });

      const togglePort = (port) => {
        port.toggleAttribute("aria-selected");
        updateSelector();
      };

      ports.forEach((port) => {
        port.addEventListener("click", () => togglePort(port));
        port.addEventListener(
          "keydown",
          (event) => event.key === " " && togglePort(port)
        );
      });
      refreshPortColors();

      document.getElementById("apply").addEventListener("click", async () => {
        const chosenPorts = Array.from(selectedPorts());
        if (chosenPorts.length === 0) {
          setStatus("Select at least one port first");
          return;
        }

        const data = chosenPorts.map((port) => ({
          index: +port.dataset.index,
          color: rgb(port.style.backgroundColor),
        }));

        try {
          setStatus("Sending selected port colors");
          await postJSON("/api/port-colors", data);
          stopCyclePreview();
          await refreshPortColors();
        } catch (error) {
          setStatus(`Failed: ${error.message}`);
        }
      });

      document.querySelectorAll("button[data-mode]").forEach((button) => {
        button.addEventListener("click", async () => {
          const mode = button.dataset.mode;

          try {
            setStatus(`Setting mode: ${button.innerText}`);
            await postJSON("/api/mode", { mode });
            stopCyclePreview();
            await refreshPortColors();
          } catch (error) {
            setStatus(`Failed: ${error.message}`);
          }
        });
      });

      document.querySelectorAll("button[data-cycle]").forEach((button) => {
        button.addEventListener("click", async () => {
          const pattern = button.dataset.cycle;
          const enabled = pattern !== "stop";

          try {
            setStatus(enabled ? `Starting ${button.innerText}` : "Stopping cycle");
            await postJSON("/api/cycle", {
              enabled,
              pattern,
              ...animationSettings(),
            });

            if (enabled) {
              startCyclePreview(pattern);
            } else {
              stopCyclePreview();
              await refreshPortColors();
            }
          } catch (error) {
            setStatus(`Failed: ${error.message}`);
          }
        });
      });
    </script>
  </head>
  <body>
    <h1>
      Etherlighter
      <span role="img" aria-label="flashlight">🔦</span>
    </h1>
    <div>
      <div>🌐 IP: <code>{{ .IP }}</code></div>
      <div>🪪 Hostname: <code>{{ .Hostname }}</code></div>
      <div>📠 Model: <code>{{ .Model }}</code></div>
      <div>🕒 Uptime: <code>{{ .Uptime }}</code></div>
    </div>

    <hr />

    <h2>Port Colors</h2>
    <div class="status-line" id="current-colors-status">Current colors: loading</div>

    <div>
      {{ range .Layout }} {{ $rows := . }}
      <div class="ports">
        {{ range $rows }} {{ $cols := . }}
        <div
          tabindex="0"
          class="port"
          data-index="{{ . }}"
          aria-label="Port {{ . }}"
        >
          <span class="port-idx">{{ . }}</span>
        </div>
        {{ end }}
      </div>
      {{ end }}
    </div>
    <div
      style="display: flex; justify-content: space-between; align-self: center"
    >
      <div>
        <input type="color" id="color-picker" name="color" value="#ffffff" />
        <label for="color-picker">👈 Select a Color</label>
      </div>
      <div>
        <input type="checkbox" id="bulk-selector" />
        <label for="bulk-selector">None Selected</label>
      </div>
    </div>

    <div style="display: flex; justify-content: center">
      <button class="danger" id="apply">Apply</button>
    </div>

    <hr />

    <h2>Special Modes</h2>

    <div
      style="
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      "
    >
      <button data-mode="speed">Speed</button>
      <button data-mode="network">Network Standard</button>
      <button data-mode="poe">PoE</button>
      <button data-mode="device_type">Device Type</button>
      <button data-mode="cold_reset">"Cold boot"</button>
      <button data-mode="warm_reset">"Warm boot"</button>
      <button data-mode="boot_done">"Boot done"</button>
    </div>

    <hr />

    <h2>Animations</h2>

    <div
      style="
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      "
    >
      <button data-cycle="all">Cycle All</button>
      <button data-cycle="offset">Cycle Staggered</button>
      <button data-cycle="kitt">KITT Scanner</button>
      <button class="danger" data-cycle="stop">Stop Cycle</button>
    </div>

    <div class="controls">
      <label for="speed-slider">
        Transition Speed <output id="speed-slider-value">50</output>
        <input
          type="range"
          id="speed-slider"
          min="1"
          max="100"
          step="1"
          value="50"
        />
      </label>
      <label for="brightness-slider">
        Animation Brightness <output id="brightness-slider-value">100</output>%
        <input
          type="range"
          id="brightness-slider"
          min="0"
          max="100"
          step="1"
          value="100"
        />
      </label>
      <label for="tail-slider">
        KITT Scanner Tail <output id="tail-slider-value">4</output>
        <input
          type="range"
          id="tail-slider"
          min="1"
          max="8"
          step="1"
          value="4"
        />
      </label>
    </div>
  </body>
</html>
